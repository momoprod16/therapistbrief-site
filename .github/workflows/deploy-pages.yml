name: Deploy Pages

# Auto-deploy to Cloudflare Pages on push to main. The weekly Recent-Briefs
# trigger pushes a commit; this workflow rolls it out without needing a CF
# token in the trigger config.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install --no-save wrangler@4

      - name: Deploy to Pages (production)
        run: npx wrangler pages deploy . --project-name=thetherapistbrief --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
